# ~/.tmux.conf

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g mouse on
set -g set-clipboard on
set -g escape-time 10
set -g focus-events on

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Windows & Panes ───────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode ─────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

set -g status-left-length 50
set -g status-left '#[fg=#89b4fa,bold] #S #[fg=#cdd6f4]│ '

set -g status-right-length 60
set -g status-right '#[fg=#a6e3a1] %H:%M #[fg=#cdd6f4]│ #[fg=#89b4fa,bold] #h '

setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#89b4fa,bold] #I:#W '

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ── Source local config if present ───────────────────────────────────────────
if-shell '[ -f ~/.tmux.conf.local ]' 'source ~/.tmux.conf.local'
