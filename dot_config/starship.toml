# ~/.config/starship.toml
# Starship prompt configuration
# Docs: https://starship.rs/config/

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$nodejs\
$rust\
$golang\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
style           = "bold blue"
truncation_length = 4
truncate_to_repo  = true

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style    = "bold red"
ahead    = "⇡${count}"
behind   = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!"
untracked = "?"
staged   = "+"
stashed  = "$"
deleted  = "✘"

[cmd_duration]
min_time   = 2000
format     = "took [$duration](bold yellow)"

[python]
symbol = " "

[nodejs]
symbol = " "

[rust]
symbol = " "

[golang]
symbol = " "

[username]
show_always = false
style_user  = "bold cyan"
format      = "[$user]($style) "

[hostname]
ssh_only = true
style    = "bold yellow"
format   = "[@$hostname]($style) "
